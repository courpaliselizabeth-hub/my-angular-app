<div class="app">
  <header class="app-header">
    <h1>Task Manager</h1>
    <div class="stats">{{ stats().completed }}/{{ stats().total }} done</div>
  </header>

  <main class="app-main">
    <app-task-form (add)="addTask($event)" />
    <app-filter-bar
      [current]="filter()"
      [counts]="stats()"
      (change)="filter.set($event)"
    />
    <app-task-list
      [tasks]="filteredTasks()"
      (toggle)="toggleTask($event)"
      (delete)="deleteTask($event)"
    />
  </main>
</div>
